<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="optionsTitle">Options</title>
    <link rel="stylesheet" href="page-common.css" />
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="options-container">
      <header class="options-header">
        <img
          class="options-icon"
          src="../../assets/icons/icon-128.png"
          alt=""
          width="32"
          height="32"
        />
        <h1 data-i18n="optionsTitle">Options</h1>
      </header>

      <form id="options-form" class="options-form">
        <!-- Dateiname -->
        <section class="options-section">
          <h2 data-i18n="optionsSectionFilename">File name</h2>
          <div class="form-group">
            <label for="opt-filename-pattern" data-i18n="optionsFilenamePattern">File name pattern</label>
            <input
              id="opt-filename-pattern"
              type="text"
              autocomplete="off"
              spellcheck="false"
            />
            <p class="hint" data-i18n="optionsFilenameHint"></p>
          </div>
        </section>

        <!-- Auto-Download -->
        <section class="options-section">
          <h2 data-i18n="optionsSectionAutoDownload">Auto-download</h2>
          <div class="form-group">
            <label for="opt-auto-mode" data-i18n="optionsAutoDownload">Auto-download captured blobs</label>
            <select id="opt-auto-mode">
              <option value="off" data-i18n="optionsAutoDownloadOff">Off</option>
              <option value="all" data-i18n="optionsAutoDownloadAll">All types</option>
              <option value="byType" data-i18n="optionsAutoDownloadByType">Selected types only</option>
            </select>
          </div>

          <div class="form-group" id="type-group">
            <div class="checkbox-row">
              <label>
                <input type="checkbox" id="opt-type-audio" />
                <span data-i18n="optionsTypeAudio">Audio</span>
              </label>
              <label>
                <input type="checkbox" id="opt-type-video" />
                <span data-i18n="optionsTypeVideo">Video</span>
              </label>
              <label>
                <input type="checkbox" id="opt-type-image" />
                <span data-i18n="optionsTypeImage">Image</span>
              </label>
              <label>
                <input type="checkbox" id="opt-type-document" />
                <span data-i18n="optionsTypeDocument">Document</span>
              </label>
            </div>
          </div>

          <div class="form-group">
            <label for="opt-min-size" data-i18n="optionsAutoDownloadMinSize">Minimum size (KB)</label>
            <input id="opt-min-size" type="number" min="0" step="1" />
          </div>

          <div class="form-group">
            <label class="inline-checkbox">
              <input type="checkbox" id="opt-mse-only-final" />
              <span data-i18n="optionsAutoDownloadMseOnlyFinal">MediaSource: only after finish</span>
            </label>
          </div>
        </section>

        <!-- Host-Regeln -->
        <section class="options-section">
          <h2 data-i18n="optionsSectionHosts">Host rules</h2>
          <div class="form-group">
            <label for="opt-whitelist" data-i18n="optionsHostWhitelist">Whitelist</label>
            <textarea id="opt-whitelist" rows="3" spellcheck="false"></textarea>
          </div>
          <div class="form-group">
            <label for="opt-blacklist" data-i18n="optionsHostBlacklist">Blacklist</label>
            <textarea id="opt-blacklist" rows="3" spellcheck="false"></textarea>
          </div>
        </section>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" data-i18n="optionsSaveBtn">Save</button>
          <button type="button" id="btn-reset" class="btn" data-i18n="optionsResetBtn">Reset</button>
        </div>
      </form>

      <div id="toast" class="toast"></div>
    </div>

    <script src="../../shared/i18n.js"></script>
    <script type="module" src="options.js"></script>
  </body>
</html>
