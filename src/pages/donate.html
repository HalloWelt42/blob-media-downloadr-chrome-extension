<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="donateTitle">Danke sagen</title>
    <link rel="stylesheet" href="page-common.css" />
    <link rel="stylesheet" href="donate.css" />
  </head>
  <body>
    <div class="donate-page">
      <div class="donate-header">
        <span class="icon" aria-hidden="true">&#x2615;</span>
        <h1 data-i18n="donateHeaderTitle">Made with love in Sachsen-Anhalt</h1>
        <p data-i18n-html="donateIntro"></p>
      </div>

      <a
        id="kofi-btn"
        href="https://ko-fi.com/HalloWelt42"
        target="_blank"
        rel="noopener"
        class="kofi-btn"
      >
        <span class="kofi-icon" aria-hidden="true">&#x2615;</span>
        <span data-i18n="donateKofi">Ko-fi -- Kaffee spendieren</span>
      </a>

      <p class="crypto-label" data-i18n="donateOrByCrypto">
        Oder per Krypto:
      </p>

      <div class="crypto-tabs">
        <button class="crypto-tab active" type="button" data-crypto="btc">
          <span class="coin-icon" aria-hidden="true">&#x20BF;</span>
          <span>Bitcoin</span>
        </button>
        <button class="crypto-tab" type="button" data-crypto="doge">
          <span class="coin-icon" aria-hidden="true">&#xD0;</span>
          <span>Dogecoin</span>
        </button>
        <button class="crypto-tab" type="button" data-crypto="eth">
          <span class="coin-icon" aria-hidden="true">&#x039E;</span>
          <span>Ethereum</span>
        </button>
      </div>

      <div class="crypto-content active" id="crypto-btc">
        <div class="crypto-box">
          <div class="qr-code" id="btc-qr">
            <span class="placeholder">QR</span>
          </div>
          <div class="crypto-details">
            <p class="crypto-name">Bitcoin (BTC)</p>
            <p class="crypto-address" id="btc-address"></p>
            <button class="copy-btn" type="button" data-coin="btc">
              &#x1F4CB;
              <span class="copy-text" data-i18n="donateCopyAddress">
                Adresse kopieren
              </span>
            </button>
          </div>
        </div>
      </div>

      <div class="crypto-content" id="crypto-doge">
        <div class="crypto-box">
          <div class="qr-code" id="doge-qr">
            <span class="placeholder">QR</span>
          </div>
          <div class="crypto-details">
            <p class="crypto-name">Dogecoin (DOGE)</p>
            <p class="crypto-address" id="doge-address"></p>
            <button class="copy-btn" type="button" data-coin="doge">
              &#x1F4CB;
              <span class="copy-text" data-i18n="donateCopyAddress">
                Adresse kopieren
              </span>
            </button>
          </div>
        </div>
      </div>

      <div class="crypto-content" id="crypto-eth">
        <div class="crypto-box">
          <div class="qr-code" id="eth-qr">
            <span class="placeholder">QR</span>
          </div>
          <div class="crypto-details">
            <p class="crypto-name">Ethereum (ETH)</p>
            <p class="crypto-address" id="eth-address"></p>
            <button class="copy-btn" type="button" data-coin="eth">
              &#x1F4CB;
              <span class="copy-text" data-i18n="donateCopyAddress">
                Adresse kopieren
              </span>
            </button>
          </div>
        </div>
      </div>

      <div class="donate-footer" data-i18n-html="donateThanks"></div>
    </div>

    <script src="../../shared/i18n.js"></script>
    <script src="donate-config.js"></script>
    <script src="donate.js"></script>
  </body>
</html>
